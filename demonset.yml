apiVersion: apps/v1
metadata:
  name: daemonset
  labels:
    app: daemonset
kind: DaemonSet
spec:
  selector:
    app: daemonset
  template:
    metadata:
      name: cloudwatch-pod
      labels:
        app: daemonset
    spec:
      containers:
      - name: cloudwatch-container
        image: amazon/cloudwatch-agent
        ports:
        - containerPort: 80
