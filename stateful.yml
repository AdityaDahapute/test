apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ssdb
  labels:
    app: ssdb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ssdb
  template:
    metadata:
      name: ssdb
      labels:
        app: ssdb
    spec:
      containers:
      - name: ssdb
        image: mysql:latest
        ports: 3306
      env:
      - name: MYSQL_ROOT_PASSWORD
        value: "123456"
