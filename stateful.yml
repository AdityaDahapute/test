apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ssdb
  labels:
    app: ssdb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ssdb
  template:
    metadata:
      name: ssdb
      labels:
        app: ssdb
    spec:
      containers:
      - name: ssdb
        image: mysql:latest
        ports:
        - containerPort: 3306
          protocol: TCP
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueForm:
            secretKeyRef:
              name: mysql-secret #the name of the metadata in secretfile nedd to match so they can understand where the password is
              key: root_pw
          #value: "123456"

          #we have written a  secret yml file to hide the password for the mysql database
